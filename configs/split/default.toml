[seed]
value = 42

[data]
data_root = "data"
split = "train"
num_points = 128
clearance = 2
step_size = 1

[pretrain-flow]
checkpoint = "outputs/checkpoints/resnet34_and_many_blocks/best.pt"
backbone = "resnet34"
is_pe = false

[pretrain-subgoal]
# SL pretrained SubGoalPolicy (KL anchor + weight 초기화 소스)
checkpoint = "outputs/checkpoints/sl_midpoint_v1/best.pt"

[recursive_subgoal_policy]
latent_dim = 128
hidden_dim = 128
max_depth = 3
backbone = "resnet34"
use_complexity_feats = true
enabled = true # always true

[rl]
total_episodes = 50000
lr = 3e-4
lr_min = 3e-5
entropy_coef = 0.05
entropy_coef_start = 0.15
entropy_warmup_ratio = 0.15
split_explore_bonus = 0.1
split_explore_warmup = 0.2
value_loss_coef = 0.5
grad_clip_norm = 1.0
midpoint_loss_coef = 0.1
midpoint_lr_scale = 0.1
entropy_coef_mid = 0.001
sl_reg_coef_start = 1.0
sl_reg_coef_end = 0.0
clearance_penalty_coef = 0.3
log_interval = 1
batch_size = 32
num_flow_samples = 4
pts_per_seg = 128
img_size = 224
total_budget = 4000
min_iter = 200
force_split_eps = 0.15
complexity_weight = 0.2
budget_scale = 0.5
val_interval = 100
val_samples = 3600
rrt_expand_size = 2.0
rrt_near_distance = 13.0
rrt_goal_bias = 0.1
rrt_flow_guidance_prob = 0.9

[curriculum]
enabled = true
warmup_ratio = 0.25
transition_ratio = 0.45
easy_thresh = 0.3
hard_thresh = 0.7

[output]
checkpoint_root = "outputs/checkpoints"
run_name = "split_agent_v1"
