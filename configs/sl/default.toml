[seed]
value = 42

[data]
data_root = "data"
num_points = 128
clearance = 2
step_size = 1
batch_size = 64
num_workers = 6

[policy]
backbone = "resnet34"
latent_dim = 128
hidden_dim = 128

[train]
epochs = 300
lr = 1e-4
grad_clip_norm = 1.0
val_interval = 1
log_interval = 10

[output]
checkpoint_root = "outputs/checkpoints"
run_name = "sl_midpoint_v1"
