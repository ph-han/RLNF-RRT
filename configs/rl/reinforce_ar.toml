[seed]
value = 42

[data]
data_root = "data"
split = "train"
num_points = 128
clearance = 2
step_size = 1

[flow]
checkpoint = "outputs/checkpoints/resnet34_and_many_blocks/best.pt"
backbone = "resnet34"
is_pe = false

[policy]
backbone = "resnet34"
latent_dim = 128
hidden_dim = 128
max_subgoals = 4   # K ~ Categorical(0..4)

[rl]
total_steps = 40000
steps_per_update = 64
lr = 1e-4
# entropy 두 개 분리:
#   count_entropy_coef: K 다양성 유지 (높을수록 K가 골고루 샘플링됨)
#   sg_entropy_coef: 위치 분포 탐색 유지
count_entropy_coef = 0.1
sg_entropy_coef = 0.1
k_warmup_steps = 2000   # 처음 N step은 K=max_subgoals 고정, 이후 자유 샘플링
baseline_ema = 0.05
grad_clip_norm = 0.5
log_interval = 1

# AR에서 reward call당 K+1 segments → num_flow_samples 절반으로 조정
num_flow_samples = 4
pts_per_seg = 32
img_size = 224

reward_w_path = 1.0
reward_w_gt = 1.5
reward_w_efficiency = 0.0   # efficiency bonus (0이면 비활성)
gt_score_decay_rate = 0.3

[output]
checkpoint_root = "outputs/checkpoints"
run_name = "reinforce_many_sg"
