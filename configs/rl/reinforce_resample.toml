[seed]
value = 42

[data]
data_root = "data"
split = "train"
num_points = 128
clearance = 2
step_size = 1

[flow]
# reward 계산에 사용할 사전학습 flow 모델 checkpoint
checkpoint = "outputs/checkpoints/resnet34_and_many_blocks/best.pt"
backbone = "resnet34"
is_pe = false

[policy]
# sub-goal policy encoder (flow 모델과 가중치 미공유)
backbone = "resnet34"
latent_dim = 128
hidden_dim = 128

[rl]
total_steps = 30000
steps_per_update = 64   # rollout 버퍼 크기 (1 update당 에피소드 수)
lr = 1e-4
entropy_coef = 0.1
baseline_ema = 0.05
grad_clip_norm = 0.0
log_interval = 1

# reward 계산 파라미터
num_flow_samples = 8    # segment당 flow 샘플 수 (클수록 정확, 느림)
pts_per_seg = 32        # segment 경로 점 수
img_size = 224
# reward 가중치
# total_reward = w_path * path_reward + w_gt * gt_score
reward_w_path = 1.0     # flow 샘플 경로의 gt_score_map 평균 점수
reward_w_gt   = 1.5     # GT(A*) 경로 proximity score (subgoal 자체 위치)
gt_score_decay_rate = 0.2  # 픽셀당 score 감소량 (3.0 - dist * decay_rate)

# obstacle re-sampling with penalty
obstacle_max_resamples = 5      # 장애물 위 선택 시 최대 재시도 횟수
obstacle_resample_penalty = 2.0 # 재시도 1회당 reward 차감량

[output]
checkpoint_root = "outputs/checkpoints"
run_name = "reinforce_resample"
